<!-- blog/templates/blog/post_list.html -->
{% extends 'blog/base.html' %}

{% block title %}All Posts{% endblock %}

{% block content %}
  {% for post in posts %}
    <div class="post">
      <h2><a href="{% url 'post_detail' post.slug %}">{{ post.title }}</a></h2>
      <p class="date">By {{ post.author.username }} | {{ post.created_at|date:"M d, Y" }}</p>
      <p>{{ post.content|slice:":200" }}...</p>
    </div>
  {% empty %}
    <p>No posts found.</p>
  {% endfor %}
{% endblock %}
